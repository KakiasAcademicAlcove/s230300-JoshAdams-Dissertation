  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=${CLUSTER_NAME}
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.http.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.key=certs/elasticsearch/elasticsearch.key
      - xpack.security.transport.ssl.certificate=certs/elasticsearch/elasticsearch.crt
      - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
      - xpack.security.transport.ssl.verification_mode=certificate
      - xpack.license.self_generated.type=${ELASTICSEARCH_LICENSE}
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - elastic-certs:/usr/share/elasticsearch/config/certs
      # - ${ELASTICSEARCH_CONFIG_DIR}/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    networks:
      - elastic_network
    mem_limit: ${ELASTICSEARCH_MEMORY_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    depends_on:
      elastic-setup:
        condition: service_healthy
    healthcheck:
      test:
       [
         "CMD-SHELL",
         "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'",
       ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=https://elasticsearch:9200
      - SERVERNAME=kibana
      - ELASTICSEARCH_USERNAME=${KIBANA_USERNAME}
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES=config/certs/ca/ca.crt
      - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${ENCRYPTION_KEY}
    volumes:
      # - ${KIBANA_CONFIG_DIR}/kibana.yml:/usr/share/kibana/config/kibana.yml
      - elastic-certs:/usr/share/kibana/config/certs
    ports:
      - "5601:5601"
    networks:
      - elastic_network
    mem_limit: ${KIBANA_MEMORY_LIMIT}
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: 
        [
         "CMD-SHELL",
         "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana-setup:
    image: curlimages/curl:${CURL_VERSION}
    container_name: kibana-setup
    user: root
    volumes:
      - ./kibana/setup:/kibana_setup
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      apk add --no-cache bash &&
      chmod +x /kibana_setup/import_saved_objects.sh &&
      /kibana_setup/import_saved_objects.sh
      "
    depends_on:
      kibana:
        condition: service_healthy
    networks:
      - elastic_network
    profiles:
      - setup

  logstash:
    build: ./logstash
    container_name: logstash
    volumes:
      - freeradius_logs:/var/log/freeradius:ro
      - elastic-certs:/usr/share/logstash/certs
      # - logstash_config:/usr/share/logstash/config
    ports:
      - "5044:5044"
    networks:
      - kafka_network
      - elastic_network
    depends_on:
      kibana:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    healthcheck:
      test: curl -fs http://localhost:9600 || exit 1
      interval: 10s
      timeout: 10s
      retries: 120

  freeradius:
    build: ./freeradius
    container_name: freeradius
    volumes:
      - freeradius_logs:${FREERADIUS_LOG_DIR}
      - type: bind
        source: ${FREERADIUS_CONFIG_DIR}/radiusd.conf
        target: /etc/freeradius/radiusd.conf
      - type: bind
        source: ${FREERADIUS_CONFIG_DIR}/users
        target: /etc/freeradius/users
      - type: bind
        source: ${FREERADIUS_CONFIG_DIR}/mods-available/detail
        target: /etc/freeradius/mods-available/detail
    entrypoint: ["freeradius", "-f"]
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    networks:
      - kafka_network
    depends_on:
      logstash:
        condition:
          service_healthy
  
